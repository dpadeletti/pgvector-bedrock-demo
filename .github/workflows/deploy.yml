name: CI/CD — Build, Test & Deploy to ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 216571348735.dkr.ecr.eu-north-1.amazonaws.com
  ECR_REPOSITORY: pgvector-bedrock-demo
  ECS_CLUSTER: pgvector-demo-cluster
  ECS_SERVICE: pgvector-demo-service
  IMAGE_TAG: latest

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Test (no infra esterna richiesta)
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit & validation tests
        # Esegue solo i test che NON richiedono DB o Bedrock.
        # I test di integrazione (search, create, health) vanno eseguiti in locale
        # puntando all'ambiente reale (vedi tests/README.md).
        run: |
          pytest tests/test_api.py -v \
            -k "test_root or test_docs or test_openapi or test_validation or test_create_document_validation or test_search_validation or test_search_limit"

  # ─────────────────────────────────────────────
  # JOB 2 — Build & Push ECR
  # ─────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        id: build-image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy su ECS Fargate
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service stability
        run: |
          echo "⏳ Attendo che il servizio ECS si stabilizzi..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Deploy completato!"

      - name: Print ALB URL
        run: |
          echo "🌍 API disponibile su:"
          echo "   http://pgvector-alb-1618965750.eu-north-1.elb.amazonaws.com"
          echo "   /docs  → Swagger UI"
          echo "   /health → Health check"
