name: CI/CD — Build, Test & Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:  # ← trigger manuale dalla UI di GitHub

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 216571348735.dkr.ecr.eu-north-1.amazonaws.com
  ECR_REPOSITORY: pgvector-bedrock-demo
  ECS_CLUSTER: pgvector-demo-cluster
  ECS_SERVICE: pgvector-demo-service
  CONTAINER_NAME: pgvector-api
  IMAGE_TAG: latest

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Test (no infra esterna richiesta)
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit & validation tests
        run: |
          pytest tests/test_api.py -v \
            -k "test_root or test_docs or test_openapi or test_validation or test_create_document_validation or test_search_validation or test_search_limit"

  # ─────────────────────────────────────────────
  # JOB 2 — Build & Push ECR
  # ─────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        id: build-image
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy su ECS Fargate
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition from running service
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "Task definition in uso: $TASK_DEF_ARN"
          aws ecs describe-task-definition \
            --task-definition $TASK_DEF_ARN \
            --query taskDefinition \
            --region ${{ env.AWS_REGION }} \
            > task-definition.json
          echo "Container nella task definition:"
          cat task-definition.json | python3 -c "import sys,json; [print(c['name']) for c in json.load(sys.stdin)['containerDefinitions']]"

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy new task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Print ALB URL
        run: |
          echo "✅ Deploy completato!"
          echo "🌍 API disponibile su:"
          echo "   http://pgvector-alb-1618965750.eu-north-1.elb.amazonaws.com"
          echo "   /docs  → Swagger UI"
          echo "   /health → Health check"
